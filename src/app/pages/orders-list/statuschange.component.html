<section class="status-change-card">
  <header>
    <p class="status-change-meta">
      OrderID: <strong>{{ orderId || '-' }}</strong>
      &nbsp;|&nbsp;
      Current: <strong>{{ currentStatus || '-' }}</strong>
    </p>
  </header>

  <div class="status-change-actions">
    <button
      type="button"
      class="status-action status-action--view-toggle"
      (click)="goToAlternateView()">
      {{ viewToggleLabel }}
    </button>

    <button
      type="button"
      class="status-action"
      [disabled]="!orderId || updating || isCurrentStatus('ready')"
      (click)="changeStatus('ready')">
      Ready
    </button>

    <button
      type="button"
      class="status-action"
      [disabled]="!orderId || updating || isCurrentStatus('complete')"
      (click)="changeStatus('complete')">
      Complete
    </button>
  </div>

  <p class="status-change-msg status-change-msg--ok" *ngIf="success">{{ success }}</p>
  <p class="status-change-msg status-change-msg--error" *ngIf="error">{{ error }}</p>
</section>
