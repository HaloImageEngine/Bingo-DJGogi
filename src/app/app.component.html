<div class="app-shell" [class.sidebar-open]="isSidebarOpen" [class.sidebar-collapsed]="isSidebarCollapsed">
  <aside class="sidebar" [class.sidebar--open]="isSidebarOpen">
    <div class="brand-card surface-card" [class.brand-card--showing-image]="showBrandCardImage">
      <ng-container *ngIf="showBrandCardImage; else brandCardContent">
        <img class="brand-card__image" [src]="brandCardImagePath" alt="DJ GOGI" />
      </ng-container>
      <ng-template #brandCardContent>
        <p class="eyebrow">{{ controlRoomLabel }}</p>
        <h1>DJ GOGI Bingo</h1>
        <p>Music Bingo Gameing Service.</p>
      </ng-template>
    </div>

    <button type="button" class="sidebar__collapse-btn" (click)="toggleSidebarCollapse()" aria-label="Collapse navigation">
      &#8249; Hide panel
    </button>

    <button type="button" class="sidebar__close" (click)="toggleSidebar()" aria-label="Close navigation">
      Close
    </button>

    <div class="sidebar__nav-shell">
      <nav class="sidebar__nav">
        <ng-container *ngFor="let section of navSections">
          <ng-container *ngIf="!section.hidden">
          <p class="nav-section__label">{{ section.title }}</p>
          <a
            *ngFor="let item of section.items"
            class="nav-link"
            [routerLink]="item.path"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeSidebar()"
          >
            <span class="nav-link__icon" [attr.data-accent]="item.accent">{{ item.icon }}</span>
            <span class="nav-link__body">
              <span class="nav-link__title">{{ item.label }}</span>
              <span class="nav-link__helper">{{ item.helper }}</span>
            </span>
            <span *ngIf="item.badge" class="nav-link__badge">{{ item.badge }}</span>
          </a>
          </ng-container>
        </ng-container>
      </nav>
    </div>

    <!-- <div class="sidebar__footer surface-card">
      <p class="eyebrow">Escalations</p>
      <p class="footer__name">{{ liaison.name }}</p>
      <p class="footer__availability">{{ liaison.availability }}</p>
      <button type="button" class="footer__button">Message Liaison</button>
    </div> -->
  </aside>

  <button
    type="button"
    class="sidebar-reveal-tab"
    *ngIf="isSidebarCollapsed"
    (click)="toggleSidebarCollapse()"
    aria-label="Expand navigation">
    &#8250;
  </button>

  <section class="workspace">
    <button type="button" class="workspace__menu" (click)="toggleSidebar()">Menu</button>

    <div class="router-surface surface-card">
      <router-outlet />
    </div>
  </section>
</div>
